<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Virtual Try-On - Dress Up Virtually</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .upload-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .upload-box {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-box:hover {
            border-color: #764ba2;
            background: #f0f1ff;
            transform: translateY(-5px);
        }

        .upload-box input {
            display: none;
        }

        .upload-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .upload-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .upload-box h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .upload-box p {
            color: #999;
            font-size: 0.9em;
        }

        .image-preview {
            margin-top: 20px;
            display: none;
        }

        .image-preview img {
            max-width: 100%;
            max-height: 250px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
        }

        button {
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-generate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 50px;
            font-size: 1.1em;
        }

        .btn-generate:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-generate:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-reset {
            background: #e0e0e0;
            color: #333;
        }

        .btn-reset:hover {
            background: #d0d0d0;
        }

        .result-section {
            display: none;
            text-align: center;
        }

        .result-section.show {
            display: block;
        }

        .result-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-top: 20px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px 20px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
            border-left: 4px solid #c33;
        }

        .error.show {
            display: block;
        }

        .success {
            background: #efe;
            color: #3c3;
            padding: 15px 20px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
            border-left: 4px solid #3c3;
        }

        .success.show {
            display: block;
        }

        .file-name {
            color: #667eea;
            font-weight: 600;
            margin-top: 10px;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .upload-section {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.8em;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✨ Virtual Try-On</h1>
            <p class="subtitle">AI-Powered Clothing Try-On Experience</p>
        </header>

        <div class="error" id="errorMessage"></div>
        <div class="success" id="successMessage"></div>

        <div class="upload-section">
            <div class="upload-box">
                <label class="upload-label">
                    <div class="upload-icon">👤</div>
                    <h3>Upload Model Photo</h3>
                    <p>Upload a photo of a person wearing minimal clothing</p>
                    <input type="file" id="modelInput" accept="image/*">
                    <div class="file-name" id="modelName"></div>
                </label>
                <div class="image-preview" id="modelPreview">
                    <img id="modelImg" src="" alt="Model Preview">
                </div>
            </div>

            <div class="upload-box">
                <label class="upload-label">
                    <div class="upload-icon">👕</div>
                    <h3>Upload Clothing Photo</h3>
                    <p>Upload a photo of clothing you want to try</p>
                    <input type="file" id="clothInput" accept="image/*">
                    <div class="file-name" id="clothName"></div>
                </label>
                <div class="image-preview" id="clothPreview">
                    <img id="clothImg" src="" alt="Cloth Preview">
                </div>
            </div>
        </div>

        <div class="button-group">
            <button class="btn-generate" id="generateBtn" onclick="generateTryOn()">
                🎨 Generate Try-On
            </button>
            <button class="btn-reset" onclick="resetApp()">
                🔄 Reset
            </button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Processing images with AI... This may take a moment...</p>
        </div>

        <div class="result-section" id="resultSection">
            <h2>Your Virtual Try-On Result</h2>
            <img class="result-image" id="resultImg" src="" alt="Try-On Result">
            <p style="margin-top: 20px; color: #666;">Download or share your virtual try-on!</p>
        </div>
    </div>

    <script>
        const modelInput = document.getElementById('modelInput');
        const clothInput = document.getElementById('clothInput');
        const generateBtn = document.getElementById('generateBtn');
        const loading = document.getElementById('loading');
        const resultSection = document.getElementById('resultSection');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        // Handle model image upload
        modelInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('modelImg').src = event.target.result;
                    document.getElementById('modelPreview').style.display = 'block';
                    document.getElementById('modelName').textContent = file.name;
                };
                reader.readAsDataURL(file);
            }
        });

        // Handle cloth image upload
        clothInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('clothImg').src = event.target.result;
                    document.getElementById('clothPreview').style.display = 'block';
                    document.getElementById('clothName').textContent = file.name;
                };
                reader.readAsDataURL(file);
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => errorMessage.classList.remove('show'), 5000);
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.classList.add('show');
            setTimeout(() => successMessage.classList.remove('show'), 5000);
        }

        async function generateTryOn() {
            const modelFile = modelInput.files[0];
            const clothFile = clothInput.files[0];

            if (!modelFile || !clothFile) {
                showError('❌ Please upload both model and clothing images!');
                return;
            }

            // Validate file sizes (max 10MB)
            const maxSize = 10 * 1024 * 1024;
            if (modelFile.size > maxSize || clothFile.size > maxSize) {
                showError('❌ File size should be less than 10MB');
                return;
            }

            // Validate file types
            const validTypes = ['image/jpeg', 'image/png', 'image/webp'];
            if (!validTypes.includes(modelFile.type) || !validTypes.includes(clothFile.type)) {
                showError('❌ Please upload valid image files (JPG, PNG, WebP)');
                return;
            }

            generateBtn.disabled = true;
            loading.classList.add('show');
            resultSection.classList.remove('show');
            errorMessage.classList.remove('show');

            try {
                const formData = new FormData();
                formData.append('model', modelFile);
                formData.append('cloth', clothFile);

                const response = await fetch('/api/generate-tryon', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`Server error: ${response.statusText}`);
                }

                const data = await response.json();

                if (data.success) {
                    document.getElementById('resultImg').src = data.result_url;
                    resultSection.classList.add('show');
                    showSuccess('✅ Virtual try-on generated successfully!');
                } else {
                    throw new Error(data.message || 'Failed to generate try-on');
                }
            } catch (error) {
                showError(`❌ Error: ${error.message}`);
            } finally {
                generateBtn.disabled = false;
                loading.classList.remove('show');
            }
        }

        function resetApp() {
            modelInput.value = '';
            clothInput.value = '';
            document.getElementById('modelPreview').style.display = 'none';
            document.getElementById('clothPreview').style.display = 'none';
            document.getElementById('modelName').textContent = '';
            document.getElementById('clothName').textContent = '';
            resultSection.classList.remove('show');
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');
        }
    </script>
</body>
</html>
